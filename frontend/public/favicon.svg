<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c7d2fe"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Shield body -->
  <path d="M24 2 L42 10 L42 22 C42 34 34 42 24 46 C14 42 6 34 6 22 L6 10 Z" 
        fill="url(#shieldGrad)" 
        stroke="#6366f1" 
        stroke-width="1.5"
        filter="url(#glow)"/>
  <!-- Inner shield highlight -->
  <path d="M24 6 L38 12.5 L38 22 C38 32 31.5 38.5 24 42 C16.5 38.5 10 32 10 22 L10 12.5 Z" 
        fill="none" 
        stroke="rgba(255,255,255,0.2)" 
        stroke-width="1"/>
  <!-- Checkmark -->
  <path d="M16 24 L21.5 29.5 L32 18" 
        fill="none" 
        stroke="url(#checkGrad)" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
</svg>